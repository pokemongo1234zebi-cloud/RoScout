name: 🌌 RoScout Collector

on:
  schedule:
    - cron: "*/15 * * * *"   # toutes les 15 minutes (GitHub peut décaler de quelques minutes)
  workflow_dispatch: {}       # bouton "Run workflow" pour lancer à la main

permissions:
  contents: write

concurrency:
  group: collector
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Collecte des données Roblox
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: node collector/collect.mjs

      - name: Commit des données
        run: |
          git config user.name "roscout-bot"
          git config user.email "bot@roscout"
          git add data/
          git diff --cached --quiet || git commit -m "📊 collecte $(date -u +'%Y-%m-%d %H:%M')"
          git push
